# Dongle (central) specific configuration.
# config/lily58.conf is shared and also applied; this file tunes the central
# for handling 2 peripherals (left + right halves).

# The dongle central receives position events from two peripherals.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=8

# Enable ZMK USB HID output. The nrf52840dongle_nrf52840 board does NOT
# enable this by default (unlike nice_nano) — without it the dongle shows
# as a CDC serial device, not a keyboard.
CONFIG_ZMK_USB=y

# Enable ZMK BLE. The nrf52840dongle_nrf52840 is a Zephyr board (not ZMK)
# and does NOT set CONFIG_ZMK_BLE by default. Without it, the dongle cannot
# communicate with peripherals over BLE — split pairing fails.
CONFIG_ZMK_BLE=y

# Proxy the two halves' battery levels to the host over USB/BLE.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# TEST
CONFIG_BT_CTLR_PHY_2M=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# USB logging for diagnostics (enabled via zmk-usb-logging snippet in build.yaml)
# Set log level to DBG (4=DBG, 3=INF, 2=WRN, 1=ERR)
CONFIG_LOG_DEFAULT_LEVEL=4

