# This file generates the GitHub Actions matrix
#
# Silakka54 (lily58 shield) with an nRF52840 dongle as the central.
# Left/right halves are demoted to peripherals via cmake-args.
#
# The dongle uses the built-in nrf52840dongle_nrf52840 board (Zephyr),
# which is designed for the Nordic Open DFU Bootloader (app @ 0x1000,
# correct non-overlapping flash partitions, outputs .bin).
# Flash via: nrfutil dfu usb-serial (PC) or maga32's Android app.
#
---
include:
  - board: nice_nano_v2
    shield: lily58_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nice_nano_v2
    shield: lily58_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
  - board: nrf52840dongle_nrf52840
    shield: lily58_dongle
    snippet: zmk-usb-logging
  - board: nrf52840dongle_nrf52840
    shield: settings_reset
  - board: nice_nano_v2
    shield: settings_reset
